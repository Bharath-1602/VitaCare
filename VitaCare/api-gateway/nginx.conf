events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server user-management-service:3002;
    }

    upstream doctor_service {
        server doctor-service:3005;
    }

    upstream registration_service {
        server registration-service:3004;
    }

    upstream appointment_service {
        server appointment-service:3001;
    }

    upstream vital_signs_service {
        server vital-signs-service:3003;
    }

    upstream forum_service {
        server forum-service:3007;
    }

    upstream complaint_service {
        server complaint-service:3008;
    }

    upstream admin_service {
        server admin-service:3009;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # User Management Service
        location /api/users {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Doctor Service
        location /api/doctors {
            proxy_pass http://doctor_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Registration Service
        location /api/patients {
            proxy_pass http://registration_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Appointment Service
        location /api/appointments {
            proxy_pass http://appointment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Vital Signs Service
        location /api/vitals {
            proxy_pass http://vital_signs_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Forum Service
        location /api/forum {
            proxy_pass http://forum_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Complaint Service
        location /api/complaints {
            proxy_pass http://complaint_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin Service
        location /api/admin {
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Frontend (catch-all — must be LAST)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
