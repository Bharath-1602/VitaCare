<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-in">
            <div class="text-center mb-4">
                <a href="index.html" style="text-decoration:none;">
                    <h3 style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;">
                        <i class="fas fa-heartbeat" style="-webkit-text-fill-color:var(--primary)"></i> VitaCare
                    </h3>
                </a>
                <h2 class="mt-3">Welcome Back</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>
            <div id="login-error" class="alert alert-danger d-none"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label fw-500">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:12px 0 0 12px;border:2px solid #e8ecf0;border-right:0;"><i class="fas fa-envelope" style="color:var(--primary)"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required style="border-left:0;border-radius:0 12px 12px 0;">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-500">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:12px 0 0 12px;border:2px solid #e8ecf0;border-right:0;"><i class="fas fa-lock" style="color:var(--primary)"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required style="border-left:0;border-radius:0 12px 12px 0;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-vc w-100 py-3" id="login-btn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errDiv = document.getElementById('login-error');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            errDiv.classList.add('d-none');

            try {
                const data = await apiRequest('/api/users/login', 'POST', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                setToken(data.token);
                setUser(data.user);
                showToast('Login successful!');
                setTimeout(() => window.location.href = '/dashboard.html', 500);
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
            }
        });
    </script>
</body>
</html>
