<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="vc-sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-heartbeat"></i> VitaCare</div>
        <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="doctors.html" class="sidebar-link"><i class="fas fa-user-md"></i> Doctors</a>
        <a href="vitals.html" class="sidebar-link"><i class="fas fa-heartbeat"></i> Vital Signs</a>
        <a href="patient-register.html" class="sidebar-link active"><i class="fas fa-clipboard-list"></i> Patient Registration</a>
        <a href="forum.html" class="sidebar-link"><i class="fas fa-comments"></i> Forum</a>
        <a href="complaints.html" class="sidebar-link"><i class="fas fa-exclamation-circle"></i> Complaints</a>
        <a href="admin.html" class="sidebar-link" id="admin-link" style="display:none;"><i class="fas fa-tachometer-alt"></i> Admin Panel</a>
        <hr style="margin:15px 25px;">
        <a href="#" class="sidebar-link" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="vc-main">
        <div class="vc-topbar">
            <div><button class="btn d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><strong>Patient Registration</strong></div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="vc-card p-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-clipboard-list me-2" style="color:var(--primary);"></i>Register as Patient</h5>
                    <form id="patient-form">
                        <div class="mb-3"><label class="form-label fw-500">Full Name</label><input type="text" class="form-control" id="name" required></div>
                        <div class="row mb-3">
                            <div class="col-4"><label class="form-label fw-500">Age</label><input type="number" class="form-control" id="age" required></div>
                            <div class="col-4"><label class="form-label fw-500">Gender</label>
                                <select class="form-select" id="gender" required><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
                            </div>
                            <div class="col-4"><label class="form-label fw-500">Blood Group</label>
                                <select class="form-select" id="bloodGroup"><option>O+</option><option>O-</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option></select>
                            </div>
                        </div>
                        <div class="mb-3"><label class="form-label fw-500">Phone</label><input type="text" class="form-control" id="phone" required></div>
                        <div class="mb-3"><label class="form-label fw-500">Address</label><textarea class="form-control" id="address" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-500">Medical History</label><textarea class="form-control" id="medicalHistory" rows="2" placeholder="Any pre-existing conditions"></textarea></div>
                        <div class="mb-3"><label class="form-label fw-500">Allergies</label><input type="text" class="form-control" id="allergies" placeholder="Any known allergies"></div>
                        <button type="submit" class="btn btn-primary-vc w-100"><i class="fas fa-check me-2"></i>Register</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="vc-card p-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-users me-2" style="color:var(--accent);"></i>Registered Patients</h5>
                    <div id="patients-list" class="text-center text-muted py-4">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) {}
        const user = getUser();
        if (user && user.role === 'admin') document.getElementById('admin-link').style.display = 'flex';

        async function loadPatients() {
            try {
                const data = await apiRequest('/api/patients');
                const container = document.getElementById('patients-list');
                if (data.length === 0) { container.innerHTML = '<p class="text-muted">No patients registered yet</p>'; return; }
                container.innerHTML = data.map(p => `
                    <div class="d-flex align-items-center justify-content-between p-3 mb-2" style="background:var(--light);border-radius:12px;">
                        <div>
                            <strong>${p.name}</strong><br>
                            <small class="text-muted">${p.age}y, ${p.gender} • ${p.bloodGroup} • ${p.phone}</small>
                        </div>
                        <span class="badge rounded-pill" style="background:var(--light-accent);color:var(--accent-dark);">${p.assignedDoctorName || 'Unassigned'}</span>
                    </div>
                `).join('');
            } catch(e) { 
                document.getElementById('patients-list').innerHTML = '<p class="text-muted">Unable to load patients</p>';
            }
        }

        document.getElementById('patient-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiRequest('/api/patients/register', 'POST', {
                    name: document.getElementById('name').value,
                    age: parseInt(document.getElementById('age').value),
                    gender: document.getElementById('gender').value,
                    bloodGroup: document.getElementById('bloodGroup').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    medicalHistory: document.getElementById('medicalHistory').value,
                    allergies: document.getElementById('allergies').value
                });
                showToast('Patient registered successfully!');
                e.target.reset();
                loadPatients();
            } catch(err) { showToast(err.message, 'error'); }
        });

        loadPatients();
    </script>
</body>
</html>
