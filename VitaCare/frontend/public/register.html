<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-in" style="max-width:500px;">
            <div class="text-center mb-4">
                <a href="index.html" style="text-decoration:none;">
                    <h3 style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;">
                        <i class="fas fa-heartbeat" style="-webkit-text-fill-color:var(--primary)"></i> VitaCare
                    </h3>
                </a>
                <h2 class="mt-3">Create Account</h2>
                <p class="text-muted">Join the VitaCare community</p>
            </div>
            <div id="reg-error" class="alert alert-danger d-none"></div>
            <form id="register-form">
                <div class="mb-3">
                    <label class="form-label fw-500">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-500">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-500">Phone Number</label>
                    <input type="text" class="form-control" id="phone" placeholder="Enter phone number">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-500">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-500">Register As</label>
                    <select class="form-select" id="role" required>
                        <option value="user">Patient / User</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary-vc w-100 py-3" id="reg-btn">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            const errDiv = document.getElementById('reg-error');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating account...';
            errDiv.classList.add('d-none');

            try {
                const data = await apiRequest('/api/users/register', 'POST', {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    password: document.getElementById('password').value,
                    role: document.getElementById('role').value
                });
                setToken(data.token);
                setUser(data.user);
                showToast('Registration successful!');
                setTimeout(() => window.location.href = '/dashboard.html', 500);
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            }
        });
    </script>
</body>
</html>
