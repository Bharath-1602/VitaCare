<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="vc-sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-heartbeat"></i> VitaCare</div>
        <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="doctors.html" class="sidebar-link"><i class="fas fa-user-md"></i> Doctors</a>
        <a href="vitals.html" class="sidebar-link"><i class="fas fa-heartbeat"></i> Vital Signs</a>
        <a href="patient-register.html" class="sidebar-link"><i class="fas fa-clipboard-list"></i> Patient Registration</a>
        <a href="forum.html" class="sidebar-link"><i class="fas fa-comments"></i> Forum</a>
        <a href="complaints.html" class="sidebar-link active"><i class="fas fa-exclamation-circle"></i> Complaints</a>
        <a href="admin.html" class="sidebar-link" id="admin-link" style="display:none;"><i class="fas fa-tachometer-alt"></i> Admin Panel</a>
        <hr style="margin:15px 25px;">
        <a href="#" class="sidebar-link" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="vc-main">
        <div class="vc-topbar">
            <div><button class="btn d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><strong>Complaints</strong></div>
            <button class="btn btn-primary-vc" data-bs-toggle="modal" data-bs-target="#complaintModal"><i class="fas fa-plus me-2"></i>File Complaint</button>
        </div>
        <div class="vc-table">
            <table class="table">
                <thead><tr><th>Subject</th><th>Description</th><th>Status</th><th>Response</th><th>Date</th></tr></thead>
                <tbody id="complaints-list"><tr><td colspan="5" class="text-center text-muted py-4">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- File Complaint Modal -->
    <div class="modal fade" id="complaintModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title fw-bold"><i class="fas fa-flag me-2" style="color:var(--accent)"></i>File a Complaint</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="complaint-form">
                    <div class="mb-3"><label class="form-label fw-500">Subject</label><input type="text" class="form-control" id="subject" required></div>
                    <div class="mb-3"><label class="form-label fw-500">Description</label><textarea class="form-control" id="description" rows="4" required placeholder="Describe your issue in detail"></textarea></div>
                    <button type="submit" class="btn btn-primary-vc w-100"><i class="fas fa-paper-plane me-2"></i>Submit Complaint</button>
                </form>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) {}
        const user = getUser();
        if (user && user.role === 'admin') document.getElementById('admin-link').style.display = 'flex';

        async function loadComplaints() {
            try {
                const data = await apiRequest('/api/complaints');
                const tbody = document.getElementById('complaints-list');
                if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No complaints found</td></tr>'; return; }
                tbody.innerHTML = data.map(c => `
                    <tr>
                        <td><strong>${c.subject}</strong></td>
                        <td style="max-width:300px;">${c.description.substring(0, 100)}${c.description.length > 100 ? '...' : ''}</td>
                        <td><span class="badge badge-${c.status} rounded-pill px-3 py-1">${c.status}</span></td>
                        <td>${c.response || '<em class="text-muted">Awaiting response</em>'}</td>
                        <td>${formatDate(c.createdAt)}</td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        document.getElementById('complaint-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiRequest('/api/complaints', 'POST', {
                    subject: document.getElementById('subject').value,
                    description: document.getElementById('description').value
                });
                showToast('Complaint submitted!');
                bootstrap.Modal.getInstance(document.getElementById('complaintModal')).hide();
                e.target.reset();
                loadComplaints();
            } catch(err) { showToast(err.message, 'error'); }
        });

        loadComplaints();
    </script>
</body>
</html>
