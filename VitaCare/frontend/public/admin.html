<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="vc-sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-heartbeat"></i> VitaCare</div>
        <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="doctors.html" class="sidebar-link"><i class="fas fa-user-md"></i> Doctors</a>
        <a href="vitals.html" class="sidebar-link"><i class="fas fa-heartbeat"></i> Vital Signs</a>
        <a href="patient-register.html" class="sidebar-link"><i class="fas fa-clipboard-list"></i> Patient Registration</a>
        <a href="forum.html" class="sidebar-link"><i class="fas fa-comments"></i> Forum</a>
        <a href="complaints.html" class="sidebar-link"><i class="fas fa-exclamation-circle"></i> Complaints</a>
        <a href="admin.html" class="sidebar-link active"><i class="fas fa-tachometer-alt"></i> Admin Panel</a>
        <hr style="margin:15px 25px;">
        <a href="#" class="sidebar-link" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="vc-main">
        <div class="vc-topbar">
            <div><button class="btn d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><strong>Admin Dashboard</strong></div>
            <span class="badge rounded-pill" style="background:var(--gradient);color:white;padding:8px 16px;">ADMIN</span>
        </div>

        <!-- Stats Grid -->
        <div class="row g-4 mb-4">
            <div class="col-md-2"><div class="stat-card green text-center"><div class="stat-number" style="color:var(--primary);" id="s-users">0</div><div class="stat-label">Users</div></div></div>
            <div class="col-md-2"><div class="stat-card blue text-center"><div class="stat-number" style="color:var(--accent);" id="s-doctors">0</div><div class="stat-label">Doctors</div></div></div>
            <div class="col-md-2"><div class="stat-card green text-center"><div class="stat-number" style="color:var(--primary);" id="s-patients">0</div><div class="stat-label">Patients</div></div></div>
            <div class="col-md-2"><div class="stat-card blue text-center"><div class="stat-number" style="color:var(--accent);" id="s-appointments">0</div><div class="stat-label">Appointments</div></div></div>
            <div class="col-md-2"><div class="stat-card green text-center"><div class="stat-number" style="color:var(--primary);" id="s-posts">0</div><div class="stat-label">Forum Posts</div></div></div>
            <div class="col-md-2"><div class="stat-card blue text-center"><div class="stat-number" style="color:var(--accent);" id="s-complaints">0</div><div class="stat-label">Complaints</div></div></div>
        </div>

        <div class="row g-4">
            <!-- Recent Appointments -->
            <div class="col-md-6">
                <div class="vc-card p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-calendar-check me-2" style="color:var(--primary);"></i>Recent Appointments</h6>
                    <div id="admin-appointments">Loading...</div>
                </div>
            </div>
            <!-- Open Complaints -->
            <div class="col-md-6">
                <div class="vc-card p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-exclamation-circle me-2" style="color:var(--accent);"></i>Recent Complaints <span class="badge rounded-pill bg-warning text-dark ms-1" id="open-badge">0 open</span></h6>
                    <div id="admin-complaints">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) {}
        if (!requireRole('admin')) {}

        async function loadAdmin() {
            try {
                const data = await apiRequest('/api/admin/dashboard');
                document.getElementById('s-users').textContent = data.totalUsers;
                document.getElementById('s-doctors').textContent = data.totalDoctors;
                document.getElementById('s-patients').textContent = data.totalPatients;
                document.getElementById('s-appointments').textContent = data.totalAppointments;
                document.getElementById('s-posts').textContent = data.totalForumPosts;
                document.getElementById('s-complaints').textContent = data.totalComplaints;
                document.getElementById('open-badge').textContent = data.openComplaints + ' open';

                const apptDiv = document.getElementById('admin-appointments');
                if (data.recentAppointments && data.recentAppointments.length > 0) {
                    apptDiv.innerHTML = data.recentAppointments.map(a => `
                        <div class="d-flex justify-content-between align-items-center p-2 mb-2" style="background:var(--light);border-radius:10px;">
                            <div><strong>${a.patientName}</strong> → ${a.doctorName}<br><small class="text-muted">${a.date} ${a.time}</small></div>
                            <span class="badge badge-${a.status} rounded-pill px-3 py-1">${a.status}</span>
                        </div>
                    `).join('');
                } else { apptDiv.innerHTML = '<p class="text-muted">No appointments</p>'; }

                const compDiv = document.getElementById('admin-complaints');
                if (data.recentComplaints && data.recentComplaints.length > 0) {
                    compDiv.innerHTML = data.recentComplaints.map(c => `
                        <div class="d-flex justify-content-between align-items-center p-2 mb-2" style="background:var(--light);border-radius:10px;">
                            <div><strong>${c.subject}</strong><br><small class="text-muted">by ${c.userName} • ${formatDate(c.createdAt)}</small></div>
                            <span class="badge badge-${c.status} rounded-pill px-3 py-1">${c.status}</span>
                        </div>
                    `).join('');
                } else { compDiv.innerHTML = '<p class="text-muted">No complaints</p>'; }
            } catch(e) { console.error(e); }
        }
        loadAdmin();
    </script>
</body>
</html>
