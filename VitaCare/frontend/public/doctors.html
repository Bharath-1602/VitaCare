<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="vc-sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-heartbeat"></i> VitaCare</div>
        <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="doctors.html" class="sidebar-link active"><i class="fas fa-user-md"></i> Doctors</a>
        <a href="vitals.html" class="sidebar-link"><i class="fas fa-heartbeat"></i> Vital Signs</a>
        <a href="patient-register.html" class="sidebar-link"><i class="fas fa-clipboard-list"></i> Patient Registration</a>
        <a href="forum.html" class="sidebar-link"><i class="fas fa-comments"></i> Forum</a>
        <a href="complaints.html" class="sidebar-link"><i class="fas fa-exclamation-circle"></i> Complaints</a>
        <a href="admin.html" class="sidebar-link" id="admin-link" style="display:none;"><i class="fas fa-tachometer-alt"></i> Admin Panel</a>
        <hr style="margin:15px 25px;">
        <a href="#" class="sidebar-link" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="vc-main">
        <div class="vc-topbar">
            <div><button class="btn d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><strong>Doctors</strong></div>
            <div id="doctor-create-btn"></div>
        </div>
        <div class="row g-4" id="doctors-list">
            <div class="col-12 text-center text-muted py-5">Loading...</div>
        </div>
    </div>

    <!-- Doctor Profile Modal -->
    <div class="modal fade" id="doctorModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title fw-bold"><i class="fas fa-user-md me-2" style="color:var(--primary)"></i>Create Doctor Profile</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="doctor-form">
                    <div class="mb-3"><label class="form-label fw-500">Specialization</label><input type="text" class="form-control" id="specialization" required placeholder="e.g., Cardiology"></div>
                    <div class="mb-3"><label class="form-label fw-500">Qualifications</label><input type="text" class="form-control" id="qualifications" placeholder="e.g., MBBS, MD"></div>
                    <div class="row mb-3">
                        <div class="col-6"><label class="form-label fw-500">Experience (years)</label><input type="number" class="form-control" id="experience" placeholder="5"></div>
                        <div class="col-6"><label class="form-label fw-500">Phone</label><input type="text" class="form-control" id="phone" placeholder="Phone number"></div>
                    </div>
                    <div class="mb-3"><label class="form-label fw-500">About</label><textarea class="form-control" id="about" rows="2" placeholder="Brief bio"></textarea></div>
                    <button type="submit" class="btn btn-primary-vc w-100"><i class="fas fa-check me-2"></i>Create Profile</button>
                </form>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) {}
        const user = getUser();
        if (user && user.role === 'admin') document.getElementById('admin-link').style.display = 'flex';
        if (user && user.role === 'doctor') {
            document.getElementById('doctor-create-btn').innerHTML = '<button class="btn btn-primary-vc" data-bs-toggle="modal" data-bs-target="#doctorModal"><i class="fas fa-plus me-2"></i>Create Profile</button>';
        }

        async function loadDoctors() {
            try {
                const data = await apiRequest('/api/doctors');
                const container = document.getElementById('doctors-list');
                if (data.length === 0) { container.innerHTML = '<div class="col-12 text-center text-muted py-5">No doctors registered yet</div>'; return; }
                container.innerHTML = data.map(d => `
                    <div class="col-md-4">
                        <div class="vc-card p-4 h-100">
                            <div class="d-flex align-items-center mb-3">
                                <div style="width:55px;height:55px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:white;font-size:1.3rem;font-weight:700;">${d.name ? d.name.charAt(0).toUpperCase() : 'D'}</div>
                                <div class="ms-3">
                                    <h6 class="fw-bold mb-0">${d.name}</h6>
                                    <small class="text-muted">${d.specialization || 'General'}</small>
                                </div>
                            </div>
                            <div class="mb-2"><i class="fas fa-graduation-cap me-2" style="color:var(--primary);"></i><small>${d.qualifications || 'N/A'}</small></div>
                            <div class="mb-2"><i class="fas fa-briefcase me-2" style="color:var(--accent);"></i><small>${d.experience || 0} years experience</small></div>
                            <div class="mb-2"><i class="fas fa-phone me-2" style="color:var(--primary);"></i><small>${d.phone || 'N/A'}</small></div>
                            ${d.about ? `<p class="text-muted mt-2 mb-0" style="font-size:0.85rem;">${d.about}</p>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        document.getElementById('doctor-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiRequest('/api/doctors/profile', 'POST', {
                    specialization: document.getElementById('specialization').value,
                    qualifications: document.getElementById('qualifications').value,
                    experience: parseInt(document.getElementById('experience').value) || 0,
                    phone: document.getElementById('phone').value,
                    about: document.getElementById('about').value
                });
                showToast('Doctor profile created!');
                bootstrap.Modal.getInstance(document.getElementById('doctorModal')).hide();
                e.target.reset();
                loadDoctors();
            } catch(err) { showToast(err.message, 'error'); }
        });

        loadDoctors();
    </script>
</body>
</html>
