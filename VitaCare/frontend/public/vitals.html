<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Signs - VitaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="vc-sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="fas fa-heartbeat"></i> VitaCare</div>
        <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="doctors.html" class="sidebar-link"><i class="fas fa-user-md"></i> Doctors</a>
        <a href="vitals.html" class="sidebar-link active"><i class="fas fa-heartbeat"></i> Vital Signs</a>
        <a href="patient-register.html" class="sidebar-link"><i class="fas fa-clipboard-list"></i> Patient Registration</a>
        <a href="forum.html" class="sidebar-link"><i class="fas fa-comments"></i> Forum</a>
        <a href="complaints.html" class="sidebar-link"><i class="fas fa-exclamation-circle"></i> Complaints</a>
        <a href="admin.html" class="sidebar-link" id="admin-link" style="display:none;"><i class="fas fa-tachometer-alt"></i> Admin Panel</a>
        <hr style="margin:15px 25px;">
        <a href="#" class="sidebar-link" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="vc-main">
        <div class="vc-topbar">
            <div><button class="btn d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><strong>Vital Signs</strong></div>
            <div id="vitals-add-btn"></div>
        </div>
        <div class="vc-table">
            <table class="table">
                <thead><tr><th>Patient</th><th>BP</th><th>Heart Rate</th><th>Temp (°F)</th><th>O₂ Level</th><th>Sugar</th><th>Recorded</th><th>Doctor</th></tr></thead>
                <tbody id="vitals-list"><tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- Add Vital Signs Modal -->
    <div class="modal fade" id="vitalModal" tabindex="-1">
        <div class="modal-dialog modal-lg"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title fw-bold"><i class="fas fa-heartbeat me-2" style="color:var(--accent)"></i>Record Vital Signs</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="vital-form">
                    <div class="row mb-3">
                        <div class="col-6"><label class="form-label fw-500">Patient ID</label><input type="text" class="form-control" id="patientId" required placeholder="Patient ID"></div>
                        <div class="col-6"><label class="form-label fw-500">Patient Name</label><input type="text" class="form-control" id="patientName" required placeholder="Patient name"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4"><label class="form-label fw-500">BP Systolic</label><input type="number" class="form-control" id="systolic" placeholder="120"></div>
                        <div class="col-4"><label class="form-label fw-500">BP Diastolic</label><input type="number" class="form-control" id="diastolic" placeholder="80"></div>
                        <div class="col-4"><label class="form-label fw-500">Heart Rate</label><input type="number" class="form-control" id="heartRate" placeholder="72"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-4"><label class="form-label fw-500">Temperature</label><input type="number" step="0.1" class="form-control" id="temperature" placeholder="98.6"></div>
                        <div class="col-4"><label class="form-label fw-500">O₂ Level (%)</label><input type="number" class="form-control" id="oxygenLevel" placeholder="98"></div>
                        <div class="col-4"><label class="form-label fw-500">Blood Sugar</label><input type="number" class="form-control" id="bloodSugar" placeholder="90"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6"><label class="form-label fw-500">Weight (kg)</label><input type="number" step="0.1" class="form-control" id="weight" placeholder="70"></div>
                        <div class="col-6"><label class="form-label fw-500">Height (cm)</label><input type="number" class="form-control" id="height" placeholder="170"></div>
                    </div>
                    <div class="mb-3"><label class="form-label fw-500">Notes</label><textarea class="form-control" id="notes" rows="2" placeholder="Additional notes"></textarea></div>
                    <button type="submit" class="btn btn-primary-vc w-100"><i class="fas fa-check me-2"></i>Save Vital Signs</button>
                </form>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) {}
        const user = getUser();
        if (user && user.role === 'admin') document.getElementById('admin-link').style.display = 'flex';
        if (user && user.role === 'doctor') {
            document.getElementById('vitals-add-btn').innerHTML = '<button class="btn btn-primary-vc" data-bs-toggle="modal" data-bs-target="#vitalModal"><i class="fas fa-plus me-2"></i>Record Vitals</button>';
        }

        async function loadVitals() {
            try {
                let data;
                if (user.role === 'doctor' || user.role === 'admin') {
                    data = await apiRequest('/api/vitals');
                } else {
                    data = await apiRequest(`/api/vitals/patient/${user.id}`);
                }
                const tbody = document.getElementById('vitals-list');
                if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No vital records found</td></tr>'; return; }
                tbody.innerHTML = data.map(v => `
                    <tr>
                        <td>${v.patientName || v.patientId}</td>
                        <td><strong>${v.bloodPressure ? v.bloodPressure.systolic + '/' + v.bloodPressure.diastolic : 'N/A'}</strong></td>
                        <td><i class="fas fa-heart me-1" style="color:#e74c3c;"></i>${v.heartRate || 'N/A'}</td>
                        <td>${v.temperature || 'N/A'}</td>
                        <td>${v.oxygenLevel || 'N/A'}%</td>
                        <td>${v.bloodSugar || 'N/A'}</td>
                        <td>${formatDate(v.recordedAt)}</td>
                        <td>${v.doctorName || 'N/A'}</td>
                    </tr>
                `).join('');
            } catch(e) { 
                document.getElementById('vitals-list').innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No vital records found</td></tr>';
            }
        }

        document.getElementById('vital-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiRequest('/api/vitals', 'POST', {
                    patientId: document.getElementById('patientId').value,
                    patientName: document.getElementById('patientName').value,
                    bloodPressure: { systolic: parseInt(document.getElementById('systolic').value) || 0, diastolic: parseInt(document.getElementById('diastolic').value) || 0 },
                    heartRate: parseInt(document.getElementById('heartRate').value) || 0,
                    temperature: parseFloat(document.getElementById('temperature').value) || 0,
                    oxygenLevel: parseInt(document.getElementById('oxygenLevel').value) || 0,
                    bloodSugar: parseInt(document.getElementById('bloodSugar').value) || 0,
                    weight: parseFloat(document.getElementById('weight').value) || 0,
                    height: parseInt(document.getElementById('height').value) || 0,
                    notes: document.getElementById('notes').value
                });
                showToast('Vital signs recorded!');
                bootstrap.Modal.getInstance(document.getElementById('vitalModal')).hide();
                e.target.reset();
                loadVitals();
            } catch(err) { showToast(err.message, 'error'); }
        });

        loadVitals();
    </script>
</body>
</html>
